<style>
.home-info {
  position: relative;
}
.streak-badge {
  position: absolute;
  top: 0;
  right: 0;
  font-size: 2rem;
  font-weight: bold;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.streak-badge span.fire {
  display: inline-block;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const homeInfo = document.querySelector('.home-info');
  if (homeInfo) {
    const badge = document.createElement('div');
    badge.className = 'streak-badge';
    badge.innerHTML = '8 <span class="fire">🔥</span>';
    homeInfo.appendChild(badge);
  }
});
</script>
