<style>
.streak-badge {
  position: absolute;
  right: 0;
  font-size: 2rem;
  font-weight: bold;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.streak-badge span.fire {
  display: inline-block;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const homeInfo = document.querySelector('.home-info');
  const title = document.querySelector('.home-info h1');
  if (homeInfo && title) {
    const badge = document.createElement('div');
    badge.className = 'streak-badge';
    badge.innerHTML = '<span class="fire">🔥</span> 16';
    badge.style.top = title.offsetTop + 'px';
    homeInfo.appendChild(badge);
  }
});
</script>
