<style>
.streak-badge {
  font-size: 2rem;
  font-weight: bold;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.streak-badge span.fire {
  display: inline-block;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const title = document.querySelector('.home-info h1');
  if (title) {
    const badge = document.createElement('span');
    badge.className = 'streak-badge';
    badge.innerHTML = ' <span class="fire">🔥</span> 8';
    title.appendChild(badge);
  }
});
</script>
